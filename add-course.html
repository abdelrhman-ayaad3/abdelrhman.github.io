<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course - Learnify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://cdn-icons-png.flaticon.com/512/3413/3413535.png" class="logo-icon">
            <h1>Learnify</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="courses.html">My Courses</a>
            <a href="add-course.html" class="active">Add Course</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main class="centered-container">
        <div class="card add-course-card">
            <h2 style="text-align: center;">New Registration</h2>
            <form>
                <div class="field"><label>Course Name</label><input type="text" placeholder="e.g. Programming" required></div>
                <div class="field"><label>Instructor</label><input type="text" placeholder="Dr. Name" required></div>
                <div class="field"><label>Credit Hours (2-5)</label><input type="number" min="2" max="5" required></div>
                <div class="field"><label>Location</label><input type="text" placeholder="Room/Lab" required></div>
                <button type="submit">Save Course</button>
            </form>
        </div>
    </main>
</body>
</html>
